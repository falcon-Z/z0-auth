openapi: 3.1.0
info:
  title: z0-auth Auth API
  version: 0.1.0
  description: |
    Session-based authentication JSON API under `/api/auth/*`.

    HTML equivalents live under `/auth/*` (see `docs/api/ui-flows.md`).
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Auth
    description: Sign-in, session, and account entrypoints
paths:
  /api/auth/session:
    get:
      tags: [Auth]
      summary: Current session
      description: |
        Returns authentication state for the console and API clients. Does not require CSRF.
        Subject to setup guard (503 when setup incomplete).
      operationId: getAuthSession
      responses:
        "200":
          description: Session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "503":
          $ref: "common.openapi.yaml#/components/responses/SetupRequired"
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Sign in
      description: |
        Validates credentials, revokes any existing session cookie, issues new `z0_session`.
        Rate limit: 10 attempts per client IP per 15 minutes.
      operationId: postAuthLogin
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; `Set-Cookie` includes session token
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedSession"
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "429":
          $ref: "common.openapi.yaml#/components/responses/TooManyRequests"
        "503":
          $ref: "common.openapi.yaml#/components/responses/SetupRequired"
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Sign out
      description: Revokes server session and clears session cookie. Requires CSRF.
      operationId: postAuthLogout
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "common.openapi.yaml#/components/schemas/LogoutResponse"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "503":
          $ref: "common.openapi.yaml#/components/responses/SetupRequired"
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Account owner signup
      description: |
        Creates the first account owner profile for the instance and signs them in.
        This endpoint is only valid before initial setup is complete.
        Once an owner already exists, requests are rejected with 409 Conflict.
        Includes organization profile details used in console branding and defaults.
      operationId: postAuthRegister
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Signed up and authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedSession"
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "409":
          $ref: "common.openapi.yaml#/components/responses/Conflict"
        "503":
          $ref: "common.openapi.yaml#/components/responses/SetupRequired"
  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      operationId: postAuthForgotPassword
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Generic success (no account enumeration)
          content:
            application/json:
              schema:
                type: object
                required: [ok, message]
                properties:
                  ok:
                    type: boolean
                    const: true
                  message:
                    type: string
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "429":
          $ref: "common.openapi.yaml#/components/responses/TooManyRequests"
        "503":
          description: SMTP not configured, or platform setup incomplete
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "common.openapi.yaml#/components/schemas/ProblemDetail"
                  - $ref: "common.openapi.yaml#/components/schemas/SetupRequiredProblem"
  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete password reset with token from email
      operationId: postAuthResetPassword
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, passwordConfirm]
              properties:
                token:
                  type: string
                password:
                  type: string
                passwordConfirm:
                  type: string
      responses:
        "200":
          description: Password updated; all sessions revoked
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    const: true
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "503":
          $ref: "common.openapi.yaml#/components/responses/ServiceUnavailable"
  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (authenticated)
      description: |
        Console-only self-service password change. Verifies the current password, applies password policy,
        revokes all other sessions, and keeps the current session active.
      operationId: postAuthChangePassword
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    const: true
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "503":
          $ref: "common.openapi.yaml#/components/responses/SetupRequired"
components:
  securitySchemes:
    CsrfHeader:
      $ref: "common.openapi.yaml#/components/securitySchemes/CsrfHeader"
    CsrfCookie:
      $ref: "common.openapi.yaml#/components/securitySchemes/CsrfCookie"
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    SessionUser:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
    SessionOrganization:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
    RegisterRequest:
      type: object
      required: [name, email, password, passwordConfirm, organizationName]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        passwordConfirm:
          type: string
        organizationName:
          type: string
    ChangePasswordRequest:
      type: object
      required: [currentPassword, password, passwordConfirm]
      properties:
        currentPassword:
          type: string
        password:
          type: string
        passwordConfirm:
          type: string
    SessionResponse:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/SessionUser"
        organization:
          $ref: "#/components/schemas/SessionOrganization"
        accountType:
          type: string
          enum: [owner, app_user]
        managedAppCount:
          type: integer
          minimum: 0
    AuthenticatedSession:
      allOf:
        - $ref: "#/components/schemas/SessionResponse"
        - type: object
          required: [authenticated, user, organization, accountType]
          properties:
            authenticated:
              type: boolean
              const: true
