openapi: 3.1.0
info:
  title: z0-auth Auth API
  version: 0.1.0
  description: |
    Session-based authentication JSON API under `/api/auth/*`.

    HTML equivalents live under `/auth/*` (see `docs/api/ui-flows.md`).
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Auth
    description: Sign-in, session, and password management. Owner onboarding is `POST /api/setup`.
paths:
  /api/auth/session:
    get:
      tags: [Auth]
      summary: Current session
      description: |
        Returns authentication state for the console and API clients. Does not require CSRF.
        Subject to setup guard (503 when setup incomplete).
      operationId: getAuthSession
      responses:
        "200":
          description: Session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "503":
          $ref: "common.openapi.yaml#/components/responses/SetupRequired"
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Sign in
      description: |
        Validates credentials, revokes any existing session cookie, issues new `z0_session`.
        Rate limit: 10 attempts per client IP per 15 minutes.
      operationId: postAuthLogin
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; `Set-Cookie` includes session token
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedSession"
        "202":
          description: Primary credentials accepted; MFA challenge required before a session is issued
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaChallengeRequired"
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "429":
          $ref: "common.openapi.yaml#/components/responses/TooManyRequests"
        "503":
          $ref: "common.openapi.yaml#/components/responses/SetupRequired"
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Sign out
      description: Revokes server session and clears session cookie. Requires CSRF.
      operationId: postAuthLogout
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      responses:
        "200":
          description: Logged out
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "common.openapi.yaml#/components/schemas/LogoutResponse"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "503":
          $ref: "common.openapi.yaml#/components/responses/SetupRequired"
  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      operationId: postAuthForgotPassword
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Generic success (no account enumeration)
          content:
            application/json:
              schema:
                type: object
                required: [ok, message]
                properties:
                  ok:
                    type: boolean
                    const: true
                  message:
                    type: string
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "429":
          $ref: "common.openapi.yaml#/components/responses/TooManyRequests"
        "503":
          description: SMTP not configured, or platform setup incomplete
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "common.openapi.yaml#/components/schemas/ProblemDetail"
                  - $ref: "common.openapi.yaml#/components/schemas/SetupRequiredProblem"
  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Complete password reset with token from email
      operationId: postAuthResetPassword
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password, passwordConfirm]
              properties:
                token:
                  type: string
                password:
                  type: string
                passwordConfirm:
                  type: string
      responses:
        "200":
          description: Password updated; all sessions revoked
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    const: true
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "503":
          $ref: "common.openapi.yaml#/components/responses/ServiceUnavailable"
  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (authenticated)
      description: |
        Console-only self-service password change. Verifies the current password, applies password policy,
        revokes all other sessions, and keeps the current session active.
      operationId: postAuthChangePassword
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    const: true
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "503":
          $ref: "common.openapi.yaml#/components/responses/SetupRequired"
  /api/auth/mfa:
    get:
      tags: [Auth]
      summary: Current console member MFA status
      operationId: getAuthMfa
      responses:
        "200":
          description: Safe MFA status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaStatus"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
    delete:
      tags: [Auth]
      summary: Disable current console member MFA
      operationId: deleteAuthMfa
      security:
        - CsrfHeader: []
          CsrfCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaProof"
      responses:
        "200":
          description: MFA disabled; other sessions and remembered browsers revoked
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
  /api/auth/mfa/enrollment:
    post:
      tags: [Auth]
      summary: Start console member TOTP enrollment
      operationId: postAuthMfaEnrollment
      security:
        - CsrfHeader: []
          CsrfCookie: []
      responses:
        "201":
          description: Pending ten-minute enrollment; response is not cacheable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaEnrollment"
        "409":
          $ref: "common.openapi.yaml#/components/responses/Conflict"
        "429":
          $ref: "common.openapi.yaml#/components/responses/TooManyRequests"
  /api/auth/mfa/enrollment/confirm:
    post:
      tags: [Auth]
      summary: Confirm TOTP enrollment and return recovery codes once
      operationId: postAuthMfaEnrollmentConfirm
      security:
        - CsrfHeader: []
          CsrfCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaProof"
      responses:
        "200":
          description: MFA enabled; recovery codes shown once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaRecoveryCodes"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
  /api/auth/mfa/recovery-codes:
    post:
      tags: [Auth]
      summary: Replace recovery codes
      operationId: postAuthMfaRecoveryCodes
      security:
        - CsrfHeader: []
          CsrfCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaProof"
      responses:
        "200":
          description: Previous recovery codes invalidated; new codes shown once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MfaRecoveryCodes"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
  /api/auth/mfa/challenge:
    post:
      tags: [Auth]
      summary: Complete a pre-authentication MFA challenge
      operationId: postAuthMfaChallenge
      security:
        - CsrfHeader: []
          CsrfCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/MfaProof"
                - type: object
                  properties:
                    rememberBrowser:
                      type: boolean
                      default: false
      responses:
        "200":
          description: Challenge consumed and full realm session issued
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "429":
          $ref: "common.openapi.yaml#/components/responses/TooManyRequests"
  /api/auth/mfa/step-up:
    post:
      tags: [Auth]
      summary: Refresh recent MFA assurance on the current console session
      operationId: postAuthMfaStepUp
      security:
        - CsrfHeader: []
          CsrfCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaProof"
      responses:
        "200":
          description: Current session has fresh MFA assurance for ten minutes
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
  /api/auth/mfa/remembered-browsers:
    get:
      tags: [Auth]
      summary: List active remembered browsers
      operationId: getAuthMfaRememberedBrowsers
      responses:
        "200":
          description: Remembered browser summaries
    delete:
      tags: [Auth]
      summary: Revoke one remembered browser
      operationId: deleteAuthMfaRememberedBrowser
      security:
        - CsrfHeader: []
          CsrfCookie: []
      responses:
        "200":
          description: Remembered browser revoked
        "404":
          $ref: "common.openapi.yaml#/components/responses/NotFound"
  /api/auth/passkeys:
    get:
      tags: [Auth]
      summary: List passkeys for the current console or exact app session
      operationId: getAuthPasskeys
      parameters:
        - name: client_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Safe owned passkey summaries; response is not cacheable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyList"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
  /api/auth/passkeys/registration/options:
    post:
      tags: [Auth]
      summary: Start an authenticated passkey registration ceremony
      operationId: postAuthPasskeyRegistrationOptions
      security:
        - CsrfHeader: []
          CsrfCookie: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                clientId:
                  type: string
      responses:
        "200":
          description: WebAuthn creation options and an HttpOnly ceremony cookie
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "409":
          $ref: "common.openapi.yaml#/components/responses/Conflict"
  /api/auth/passkeys/registration/verify:
    post:
      tags: [Auth]
      summary: Verify and store a passkey registration
      operationId: postAuthPasskeyRegistrationVerify
      security:
        - CsrfHeader: []
          CsrfCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [response]
              properties:
                response:
                  type: object
                  additionalProperties: true
                label:
                  type: string
                  maxLength: 80
                clientId:
                  type: string
      responses:
        "201":
          description: Verified public credential stored
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "409":
          $ref: "common.openapi.yaml#/components/responses/Conflict"
  /api/auth/passkeys/authentication/options:
    post:
      tags: [Auth]
      summary: Start email-first passkey authentication or current-session step-up
      operationId: postAuthPasskeyAuthenticationOptions
      security:
        - CsrfHeader: []
          CsrfCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                clientId:
                  type: string
                returnTo:
                  type: string
                stepUp:
                  type: boolean
      responses:
        "200":
          description: Fixed-shape WebAuthn request options and an HttpOnly ceremony cookie
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "429":
          $ref: "common.openapi.yaml#/components/responses/TooManyRequests"
  /api/auth/passkeys/authentication/verify:
    post:
      tags: [Auth]
      summary: Verify a passkey assertion and create a realm session or refresh step-up
      operationId: postAuthPasskeyAuthenticationVerify
      security:
        - CsrfHeader: []
          CsrfCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [response]
              properties:
                response:
                  type: object
                  additionalProperties: true
                clientId:
                  type: string
      responses:
        "200":
          description: Assertion consumed; session or current-session assurance updated
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "429":
          $ref: "common.openapi.yaml#/components/responses/TooManyRequests"
  /api/auth/passkeys/rename:
    post:
      tags: [Auth]
      summary: Rename one owned passkey
      operationId: postAuthPasskeyRename
      security:
        - CsrfHeader: []
          CsrfCookie: []
      responses:
        "200":
          description: Passkey renamed
        "404":
          $ref: "common.openapi.yaml#/components/responses/NotFound"
  /api/auth/passkeys/remove:
    post:
      tags: [Auth]
      summary: Remove one owned passkey and revoke other sessions
      operationId: postAuthPasskeyRemove
      security:
        - CsrfHeader: []
          CsrfCookie: []
      responses:
        "200":
          description: Passkey removed
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "404":
          $ref: "common.openapi.yaml#/components/responses/NotFound"
components:
  securitySchemes:
    CsrfHeader:
      $ref: "common.openapi.yaml#/components/securitySchemes/CsrfHeader"
    CsrfCookie:
      $ref: "common.openapi.yaml#/components/securitySchemes/CsrfCookie"
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    SessionUser:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
    ChangePasswordRequest:
      type: object
      required: [currentPassword, password, passwordConfirm]
      properties:
        currentPassword:
          type: string
        password:
          type: string
        passwordConfirm:
          type: string
    MfaProof:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Six-digit TOTP or single-use recovery code.
    MfaStatus:
      type: object
      required: [enabled, pendingEnrollment, enabledAt, recoveryCodesRemaining]
      properties:
        enabled:
          type: boolean
        pendingEnrollment:
          type: boolean
        enabledAt:
          type: [string, "null"]
          format: date-time
        recoveryCodesRemaining:
          type: integer
          minimum: 0
    MfaEnrollment:
      type: object
      required: [secret, provisioningUri, expiresAt]
      properties:
        secret:
          type: string
          description: Base32 TOTP setup secret; returned only for the pending enrollment.
        provisioningUri:
          type: string
        expiresAt:
          type: string
          format: date-time
    MfaRecoveryCodes:
      type: object
      required: [recoveryCodes]
      properties:
        recoveryCodes:
          type: array
          minItems: 10
          maxItems: 10
          items:
            type: string
    MfaChallengeRequired:
      type: object
      required: [authenticated, mfaRequired, challengeExpiresAt]
      properties:
        authenticated:
          type: boolean
          const: false
        mfaRequired:
          type: boolean
          const: true
        challengeExpiresAt:
          type: string
          format: date-time
    PasskeySummary:
      type: object
      required: [id, label, createdAt, lastUsedAt, backupEligible, backedUp]
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          maxLength: 80
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: [string, "null"]
          format: date-time
        backupEligible:
          type: boolean
        backedUp:
          type: boolean
    PasskeyList:
      type: object
      required: [passkeys, canRegister, maxPasskeys]
      properties:
        passkeys:
          type: array
          items:
            $ref: "#/components/schemas/PasskeySummary"
        canRegister:
          type: boolean
        maxPasskeys:
          type: integer
          const: 10
    SessionResponse:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/SessionUser"
        isInstanceMember:
          type: boolean
          description: True when the user is an instance member (console access).
        isBootstrap:
          type: boolean
          description: True when this member created the instance at setup (owner).
        organizationName:
          type: string
          description: Instance organization display name from setup.
    AuthenticatedSession:
      allOf:
        - $ref: "#/components/schemas/SessionResponse"
        - type: object
          required: [authenticated, user, isInstanceMember, isBootstrap, organizationName]
          properties:
            authenticated:
              type: boolean
              const: true
            isInstanceMember:
              type: boolean
            isBootstrap:
              type: boolean
            organizationName:
              type: string
