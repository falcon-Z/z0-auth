openapi: 3.1.0
info:
  title: z0-auth Auth API
  version: 0.1.0
paths:
  /api/auth/session:
    get:
      summary: Current session
      responses:
        "200":
          description: Session payload
  /api/auth/login:
    post:
      summary: Sign in
      responses:
        "200":
          description: Authenticated
        "401":
          description: Invalid credentials
  /api/auth/logout:
    post:
      summary: Sign out
  /api/auth/reset-password:
    post:
      summary: Password reset (unavailable until SMTP is configured)
      responses:
        "503":
          description: Password reset not available
  /api/auth/forgot-password:
    post:
      summary: Password reset (unavailable until SMTP is configured)
      responses:
        "503":
          description: Password reset not available
  /api/auth/register:
    post:
      summary: Disabled on platform
      responses:
        "403":
          description: Registration disabled
