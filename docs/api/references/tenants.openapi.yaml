openapi: 3.1.0
info:
  title: z0-auth Tenants API (removed)
  version: 0.0.0
  description: |
    **Removed in M01 (migration `0011_instance_pivot`).**

    Multi-organization tenants, tenant-scoped invites, platform RBAC, and `/api/v1/roles`
    are no longer part of the product. Use [invites.openapi.yaml](./invites.openapi.yaml)
    for instance members and invites.

    Historical paths (not implemented):
    - `GET/POST /api/v1/tenants`
    - `GET /api/v1/tenants/{tenantId}/members`
    - `POST /api/v1/tenants/{tenantId}/invites`
    - `GET /api/v1/roles?scope=tenant`
paths: {}
