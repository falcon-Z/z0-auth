openapi: 3.1.0
info:
  title: z0-auth Console API
  version: 0.2.0
  description: Console-only helpers (dashboard metrics). Requires instance membership.
servers:
  - url: http://localhost:3000
tags:
  - name: Console
paths:
  /api/v1/console/summary:
    get:
      tags: [Console]
      summary: Console dashboard summary
      operationId: getConsoleSummary
      description: Returns instance-wide counts for signed-in instance members.
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Summary metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsoleSummaryResponse"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
components:
  schemas:
    ConsoleSummaryResponse:
      type: object
      required: [instance, sessions]
      properties:
        instance:
          type: object
          required: [organizationName, memberCount, pendingInviteCount, userCount]
          properties:
            organizationName: { type: string }
            memberCount: { type: integer }
            pendingInviteCount: { type: integer }
            userCount: { type: integer }
        sessions:
          type: object
          required: [activeCount]
          properties:
            activeCount: { type: integer }
