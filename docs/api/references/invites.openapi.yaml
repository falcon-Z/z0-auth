openapi: 3.1.0
info:
  title: z0-auth Instance Members & Invites API
  version: 0.2.0
  description: |
    Instance-scoped console members and invite-only onboarding.
    All `/api/v1/members/*` routes require a signed-in instance member.
servers:
  - url: http://localhost:3000
tags:
  - name: Members
  - name: Invites
paths:
  /api/v1/members:
    get:
      tags: [Members]
      summary: List instance members
      operationId: listInstanceMembers
      security:
        - SessionCookie: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, disabled, locked, deleted]
      responses:
        "200":
          description: Active instance members
          content:
            application/json:
              schema:
                type: object
                required: [members]
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/InstanceMember"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
  /api/v1/members/{userId}:
    delete:
      tags: [Members]
      summary: Remove instance member
      operationId: removeInstanceMember
      security:
        - CsrfHeader: []
          CsrfCookie: []
          SessionCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Member removed
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "404":
          $ref: "common.openapi.yaml#/components/responses/NotFound"
        "409":
          description: Cannot remove last member
  /api/v1/members/{userId}/lifecycle/{action}:
    post:
      tags: [Members]
      summary: Change console-member lifecycle state
      operationId: transitionInstanceMemberLifecycle
      security:
        - CsrfHeader: []
          CsrfCookie: []
          SessionCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [disable, enable, unlock, delete, restore, permanently-delete]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                confirmationEmail: { type: string, format: email }
      responses:
        "200": { description: Account state changed }
        "400": { $ref: "common.openapi.yaml#/components/responses/ValidationError" }
        "403": { $ref: "common.openapi.yaml#/components/responses/Forbidden" }
        "404": { $ref: "common.openapi.yaml#/components/responses/NotFound" }
        "409": { $ref: "common.openapi.yaml#/components/responses/Conflict" }
  /api/v1/members/{userId}/password-reset:
    post:
      tags: [Members]
      summary: Send an administrator-initiated console password reset
      operationId: sendMemberAdminPasswordReset
      security:
        - CsrfHeader: []
          CsrfCookie: []
          SessionCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Reset email sent }
        "403": { $ref: "common.openapi.yaml#/components/responses/Forbidden" }
        "404": { $ref: "common.openapi.yaml#/components/responses/NotFound" }
        "409": { $ref: "common.openapi.yaml#/components/responses/Conflict" }
  /api/v1/members/{userId}/mfa-reset:
    post:
      tags: [Members]
      summary: Reset a console member's MFA enrollment
      operationId: resetMemberMfa
      description: Removes the member's authenticator factor, recovery codes, remembered browsers, pending MFA challenges, and active sessions. Requires recent MFA verification by the operator.
      security:
        - CsrfHeader: []
          CsrfCookie: []
          SessionCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: MFA enrollment reset }
        "401": { $ref: "common.openapi.yaml#/components/responses/Unauthorized" }
        "403": { $ref: "common.openapi.yaml#/components/responses/Forbidden" }
        "404": { $ref: "common.openapi.yaml#/components/responses/NotFound" }
  /api/v1/members/invites:
    get:
      tags: [Members]
      summary: List pending instance invites
      operationId: listInstanceInvites
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Pending invites
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
    post:
      tags: [Members]
      summary: Create instance invitation
      operationId: createInstanceInvite
      security:
        - CsrfHeader: []
          CsrfCookie: []
          SessionCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteRequest"
      responses:
        "201":
          description: Invite created (deliver via returned link or mailto)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInviteResponse"
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "409":
          description: Already a member or duplicate pending invite
  /api/v1/members/invites/{inviteId}:
    delete:
      tags: [Members]
      summary: Revoke pending invitation
      operationId: revokeInstanceInvite
      security:
        - CsrfHeader: []
          CsrfCookie: []
          SessionCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invite revoked
        "401":
          $ref: "common.openapi.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "common.openapi.yaml#/components/responses/Forbidden"
        "404":
          $ref: "common.openapi.yaml#/components/responses/NotFound"
  /api/v1/invites/{token}:
    get:
      tags: [Invites]
      summary: Invitation preview
      operationId: getInvitePreview
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Preview for accept/decline UI
        "404":
          $ref: "common.openapi.yaml#/components/responses/NotFound"
  /api/v1/invites/{token}/accept:
    post:
      tags: [Invites]
      summary: Accept invitation
      operationId: acceptInvite
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteRequest"
      responses:
        "200":
          description: Accepted (session cookie set for new accounts)
        "400":
          $ref: "common.openapi.yaml#/components/responses/ValidationError"
        "401":
          description: Existing account must sign in first
        "404":
          $ref: "common.openapi.yaml#/components/responses/NotFound"
        "409":
          description: Invite not pending, expired, or email mismatch
  /api/v1/invites/{token}/decline:
    post:
      tags: [Invites]
      summary: Decline invitation
      operationId: declineInvite
      security:
        - CsrfHeader: []
          CsrfCookie: []
      parameters:
        - $ref: "common.openapi.yaml#/components/parameters/CsrfHeader"
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Declined
        "404":
          $ref: "common.openapi.yaml#/components/responses/NotFound"
components:
  schemas:
    InstanceMember:
      type: object
      required: [userId, email, name, joinedAt, isBootstrap, status, emailVerified, mfaEnabled, disabledAt, lockedUntil, deletedAt, roles]
      properties:
        userId: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        joinedAt: { type: string, format: date-time }
        isBootstrap: { type: boolean }
        status:
          type: string
          enum: [active, disabled, locked, deleted]
        emailVerified: { type: boolean }
        mfaEnabled: { type: boolean }
        disabledAt: { type: string, format: date-time, nullable: true }
        lockedUntil: { type: string, format: date-time, nullable: true }
        deletedAt: { type: string, format: date-time, nullable: true }
        roles:
          type: array
          items:
            type: object
            required: [id, key, name]
            properties:
              id: { type: string, format: uuid }
              key: { type: string }
              name: { type: string }
    CreateInviteRequest:
      type: object
      required: [email, invitedName]
      properties:
        email: { type: string, format: email }
        invitedName: { type: string }
    CreateInviteResponse:
      type: object
      required: [id, inviteUrl, expiresAt, email, invitedName, emailDelivery]
      properties:
        id: { type: string, format: uuid }
        inviteUrl: { type: string, format: uri }
        expiresAt: { type: string, format: date-time }
        email: { type: string, format: email }
        invitedName: { type: string }
        emailDelivery:
          type: string
          enum: [sent, failed, skipped]
    AcceptInviteRequest:
      type: object
      properties:
        name: { type: string }
        password: { type: string }
        passwordConfirm: { type: string }
