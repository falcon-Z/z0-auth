openapi: 3.0.3
info:
  title: Z0 Auth API
  description: |
    Z0 Auth is an open-source, self-hosted authentication and authorization platform.

    ## Authentication
    Most endpoints require a valid JWT access token passed as a Bearer token or via HTTP-only cookie.

    ## Rate Limiting
    - Auth endpoints: 10 requests per 15 minutes
    - Setup endpoints: 5 requests per 15 minutes
    - General API: 100 requests per minute

    ## Error Responses
    All errors follow a consistent format with `success: false`, `error` object containing `message`, `code`, and optional `details`.
  version: 1.0.0
  contact:
    name: Z0 Auth Support
  license:
    name: MIT

servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://auth.example.com/api
    description: Production server

tags:
  - name: Health
    description: Health check and monitoring endpoints
  - name: Setup
    description: Initial platform setup endpoints
  - name: Auth
    description: Authentication endpoints (login, register, tokens)
  - name: Admin
    description: Platform administration endpoints
  - name: Platform
    description: Platform-level management (organizations, users)
  - name: Organizations
    description: Organization-level management
  - name: Apps
    description: Application management within organizations
  - name: Users
    description: User self-service endpoints

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from login endpoint

    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: HTTP-only cookie containing JWT access token

  schemas:
    # Base response types
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        requestId:
          type: string
          format: uuid

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
            details:
              type: object

    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string
              example: VALIDATION_ERROR
            issues:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
                  code:
                    type: string

    # Pagination
    PaginationParams:
      type: object
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        offset:
          type: integer
          minimum: 0
          default: 0

    PaginatedResponse:
      type: object
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # Core entities
    User:
      type: object
      properties:
        id:
          type: string
          format: cuid
        email:
          type: string
          format: email
        name:
          type: string
        avatar:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/UserStatus'
        emailVerified:
          type: boolean
        twoFactorEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastLoginAt:
          type: string
          format: date-time
          nullable: true

    UserStatus:
      type: string
      enum: [ACTIVE, INACTIVE, PENDING, SUSPENDED, DELETED]

    Organization:
      type: object
      properties:
        id:
          type: string
          format: cuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/OrganizationStatus'
        maxUsers:
          type: integer
          nullable: true
        maxApps:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrganizationStatus:
      type: string
      enum: [ACTIVE, INACTIVE, SUSPENDED]

    App:
      type: object
      properties:
        id:
          type: string
          format: cuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        organizationId:
          type: string
          format: cuid
        status:
          $ref: '#/components/schemas/AppStatus'
        clientId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppStatus:
      type: string
      enum: [ACTIVE, INACTIVE, SUSPENDED]

    Session:
      type: object
      properties:
        id:
          type: string
          format: cuid
        userId:
          type: string
        appId:
          type: string
        deviceId:
          type: string
          nullable: true
        userAgent:
          type: string
        ipAddress:
          type: string
        status:
          type: string
          enum: [ACTIVE, EXPIRED, REVOKED]
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time

    Device:
      type: object
      properties:
        id:
          type: string
          format: cuid
        userId:
          type: string
        fingerprint:
          type: string
        deviceType:
          type: string
          enum: [DESKTOP, MOBILE, TABLET, UNKNOWN]
        deviceName:
          type: string
        browserName:
          type: string
          nullable: true
        osName:
          type: string
          nullable: true
        isTrusted:
          type: boolean
        status:
          type: string
          enum: [ACTIVE, BLOCKED, SUSPICIOUS]
        lastLoginAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    # Membership types
    OrganizationMembership:
      type: object
      properties:
        id:
          type: string
          format: cuid
        userId:
          type: string
        organizationId:
          type: string
        roleType:
          $ref: '#/components/schemas/OrgRoleType'
        isActive:
          type: boolean
        isDefault:
          type: boolean
        grantedAt:
          type: string
          format: date-time

    AppMembership:
      type: object
      properties:
        id:
          type: string
          format: cuid
        userId:
          type: string
        appId:
          type: string
        roleType:
          $ref: '#/components/schemas/AppRoleType'
        externalId:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        customScopes:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        joinedAt:
          type: string
          format: date-time

    # Role types
    PlatformRoleType:
      type: string
      enum: [SUPER_ADMIN, ORG_MANAGER, SECURITY_MANAGER, AUDITOR, SUPPORT_MANAGER]

    OrgRoleType:
      type: string
      enum: [ORG_OWNER, ORG_ADMIN, ORG_DEVELOPER, ORG_MEMBER]

    AppRoleType:
      type: string
      enum: [APP_OWNER, APP_MANAGER, APP_USER]

    # API Keys
    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: cuid
        appId:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
        status:
          type: string
          enum: [ACTIVE, ROTATING, DEPRECATED, REVOKED]
        expiresAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    UserApiKey:
      type: object
      properties:
        id:
          type: string
          format: cuid
        userId:
          type: string
        appId:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
        status:
          type: string
          enum: [ACTIVE, ROTATING, DEPRECATED, REVOKED]
        scopes:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # Audit
    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: cuid
        action:
          type: string
        actorId:
          type: string
          nullable: true
        actorType:
          type: string
          enum: [user, platform_manager, system, api]
        targetId:
          type: string
          nullable: true
        targetType:
          type: string
          nullable: true
        targetEmail:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time

  parameters:
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
        format: cuid
      description: Organization ID

    AppId:
      name: appId
      in: path
      required: true
      schema:
        type: string
        format: cuid
      description: Application ID

    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: cuid
      description: User ID

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Maximum number of items to return

    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Number of items to skip

  responses:
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Authentication required
              code: UNAUTHORIZED

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Access denied
              code: FORBIDDEN

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Resource not found
              code: NOT_FOUND

    ValidationError:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              message: Internal server error
              code: INTERNAL_ERROR

paths:
  # Include references to other spec files
  # Health endpoints
  /health/live:
    $ref: './health.yaml#/paths/~1live'
  /health/ready:
    $ref: './health.yaml#/paths/~1ready'
  /health/metrics:
    $ref: './health.yaml#/paths/~1metrics'
