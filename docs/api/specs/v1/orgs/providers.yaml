openapi: 3.0.3
info:
  title: Z0 Auth - Organization External Providers API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - External Providers
      summary: List external providers
      description: |
        List all configured external authentication providers for an organization.
        Includes OAuth2, SAML, OIDC, and LDAP providers.
      operationId: listExternalProviders
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
      responses:
        '200':
          description: List of configured providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExternalProviderSummary'
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'

    post:
      tags:
        - External Providers
      summary: Configure external provider
      description: |
        Configure a new external authentication provider for the organization.
        Supports OAuth2, SAML, OIDC, LDAP, and custom providers.
        Requires org:settings:write scope.
      operationId: createExternalProvider
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExternalProvider'
            examples:
              oauth2:
                summary: OAuth2 Provider (Google)
                value:
                  provider: GOOGLE
                  providerType: OAUTH2
                  clientId: your-client-id.apps.googleusercontent.com
                  clientSecret: your-client-secret
                  redirectUri: https://auth.example.com/callback/google
                  scopes:
                    - openid
                    - email
                    - profile
                  autoProvision: true
                  defaultRole: member
              saml:
                summary: SAML Provider
                value:
                  provider: SAML_GENERIC
                  providerType: SAML
                  samlEntityId: https://idp.example.com/entity
                  samlSsoUrl: https://idp.example.com/sso
                  samlCertificate: "-----BEGIN CERTIFICATE-----..."
                  autoProvision: true
              ldap:
                summary: LDAP Provider
                value:
                  provider: LDAP_GENERIC
                  providerType: LDAP
                  ldapUrl: ldaps://ldap.example.com:636
                  ldapBaseDn: dc=example,dc=com
                  ldapBindDn: cn=admin,dc=example,dc=com
                  ldapBindPassword: secret
                  autoProvision: false
      responses:
        '201':
          description: Provider configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/ExternalProviderSummary'
                  requestId:
                    type: string
        '400':
          $ref: '../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '409':
          description: Provider already configured
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

  /{providerId}:
    get:
      tags:
        - External Providers
      summary: Get provider details
      description: |
        Get detailed configuration for a specific external provider.
        Secrets (clientSecret, ldapBindPassword) are not returned.
      operationId: getExternalProvider
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ExternalProviderDetail'
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'

    patch:
      tags:
        - External Providers
      summary: Update provider
      description: |
        Update external provider configuration.
        Requires org:settings:write scope.
      operationId: updateExternalProvider
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExternalProvider'
      responses:
        '200':
          description: Provider updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/ExternalProviderSummary'
                  requestId:
                    type: string
        '400':
          $ref: '../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'

    delete:
      tags:
        - External Providers
      summary: Delete provider
      description: |
        Delete an external provider configuration.
        Cannot delete providers with active users linked to them.
        Requires org:settings:delete scope.
      operationId: deleteExternalProvider
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'
        '409':
          description: Cannot delete provider with active users
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

  /{providerId}/toggle:
    patch:
      tags:
        - External Providers
      summary: Toggle provider status
      description: |
        Enable or disable an external provider.
        Requires org:settings:write scope.
      operationId: toggleExternalProvider
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      provider:
                        type: string
                      isEnabled:
                        type: boolean
                      updatedAt:
                        type: string
                        format: date-time
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'

  /{providerId}/test:
    post:
      tags:
        - External Providers
      summary: Test provider configuration
      description: |
        Test an external provider configuration.
        Validates that required fields are configured based on provider type.
        Requires org:settings:write scope.
      operationId: testExternalProvider
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: providerId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Test results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      provider:
                        type: string
                      providerType:
                        type: string
                      testResults:
                        type: object
                        properties:
                          success:
                            type: boolean
                          checks:
                            type: array
                            items:
                              type: object
                              properties:
                                name:
                                  type: string
                                passed:
                                  type: boolean
                                message:
                                  type: string
                  requestId:
                    type: string
              example:
                success: true
                data:
                  provider: GOOGLE
                  providerType: OAUTH2
                  testResults:
                    success: true
                    checks:
                      - name: Client ID
                        passed: true
                        message: Client ID is configured
                      - name: Client Secret
                        passed: true
                        message: Client Secret is configured
                      - name: Redirect URI
                        passed: true
                        message: "Redirect URI: https://auth.example.com/callback/google"
                      - name: Provider Status
                        passed: true
                        message: Provider is enabled
                requestId: req_abc123
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'

components:
  schemas:
    ExternalProviderSummary:
      type: object
      properties:
        id:
          type: string
        provider:
          $ref: '#/components/schemas/ExternalProviderEnum'
        providerType:
          $ref: '#/components/schemas/ProviderTypeEnum'
        isEnabled:
          type: boolean
        clientId:
          type: string
          nullable: true
        redirectUri:
          type: string
          nullable: true
        scopes:
          type: array
          items:
            type: string
        autoProvision:
          type: boolean
        defaultRole:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ExternalProviderDetail:
      allOf:
        - $ref: '#/components/schemas/ExternalProviderSummary'
        - type: object
          properties:
            mappings:
              type: object
              nullable: true
            restrictions:
              type: object
              nullable: true
            samlEntityId:
              type: string
              nullable: true
            samlSsoUrl:
              type: string
              nullable: true
            ldapUrl:
              type: string
              nullable: true
            ldapBaseDn:
              type: string
              nullable: true
            ldapBindDn:
              type: string
              nullable: true
            createdBy:
              type: string
              nullable: true

    CreateExternalProvider:
      type: object
      required:
        - provider
        - providerType
      properties:
        provider:
          $ref: '#/components/schemas/ExternalProviderEnum'
        providerType:
          $ref: '#/components/schemas/ProviderTypeEnum'
        isEnabled:
          type: boolean
          default: true
        clientId:
          type: string
          description: Required for OAuth2/OIDC providers
        clientSecret:
          type: string
          description: Required for OAuth2/OIDC providers
        redirectUri:
          type: string
          format: uri
          description: OAuth callback URL
        scopes:
          type: array
          items:
            type: string
          default: []
        autoProvision:
          type: boolean
          default: false
          description: Automatically create users on first login
        defaultRole:
          type: string
          description: Role to assign to auto-provisioned users
        mappings:
          type: object
          description: Attribute mappings from provider to user fields
        restrictions:
          type: object
          description: Access restrictions (e.g., allowed domains)
        samlEntityId:
          type: string
          description: Required for SAML providers
        samlSsoUrl:
          type: string
          format: uri
          description: Required for SAML providers
        samlCertificate:
          type: string
          description: X.509 certificate for SAML
        ldapUrl:
          type: string
          description: Required for LDAP providers (e.g., ldaps://ldap.example.com:636)
        ldapBindDn:
          type: string
          description: Required for LDAP providers
        ldapBindPassword:
          type: string
          description: Required for LDAP providers
        ldapBaseDn:
          type: string
          description: Required for LDAP providers

    UpdateExternalProvider:
      type: object
      properties:
        isEnabled:
          type: boolean
        clientId:
          type: string
        clientSecret:
          type: string
        redirectUri:
          type: string
          format: uri
        scopes:
          type: array
          items:
            type: string
        autoProvision:
          type: boolean
        defaultRole:
          type: string
        mappings:
          type: object
        restrictions:
          type: object
        samlEntityId:
          type: string
        samlSsoUrl:
          type: string
          format: uri
        samlCertificate:
          type: string
        ldapUrl:
          type: string
        ldapBindDn:
          type: string
        ldapBindPassword:
          type: string
        ldapBaseDn:
          type: string

    ExternalProviderEnum:
      type: string
      enum:
        - GOOGLE
        - GITHUB
        - MICROSOFT
        - FACEBOOK
        - LINKEDIN
        - TWITTER
        - DISCORD
        - SLACK
        - OKTA
        - AUTH0
        - KEYCLOAK
        - AZURE_AD
        - SAML_GENERIC
        - LDAP_GENERIC
        - CUSTOM_OAUTH2

    ProviderTypeEnum:
      type: string
      enum:
        - OAUTH2
        - SAML
        - OIDC
        - LDAP
        - CUSTOM
