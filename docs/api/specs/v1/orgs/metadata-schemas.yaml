openapi: 3.0.3
info:
  title: Z0 Auth - User Metadata Schemas API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - Metadata Schemas
      summary: List metadata schemas
      description: |
        List all user metadata schemas for an organization.
        Schemas define custom user fields using JSON Schema format.
        Requires org:settings:read scope.
      operationId: listMetadataSchemas
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: active
          in: query
          schema:
            type: boolean
          description: Filter by active status
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: List of metadata schemas
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MetadataSchema'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'

    post:
      tags:
        - Metadata Schemas
      summary: Create metadata schema
      description: |
        Create a new user metadata schema for the organization.
        The schema uses JSON Schema format to define field types and validation.
        Requires org:settings:write scope.
      operationId: createMetadataSchema
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMetadataSchema'
            example:
              name: employee_profile
              description: Employee profile information
              schema:
                type: object
                properties:
                  department:
                    type: string
                    title: Department
                    enum: [Engineering, Sales, Marketing, HR, Finance]
                  title:
                    type: string
                    title: Job Title
                    maxLength: 100
                  startDate:
                    type: string
                    format: date
                    title: Start Date
                  isManager:
                    type: boolean
                    default: false
                required:
                  - department
                additionalProperties: false
              isGlobal: false
              requiredRole: ORG_ADMIN
      responses:
        '201':
          description: Schema created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/MetadataSchema'
                  requestId:
                    type: string
        '400':
          $ref: '../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '409':
          description: Schema with this name already exists
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

  /{schemaId}:
    get:
      tags:
        - Metadata Schemas
      summary: Get metadata schema
      description: |
        Get detailed information about a specific metadata schema.
        Requires org:settings:read scope.
      operationId: getMetadataSchema
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: schemaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Schema details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MetadataSchema'
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'

    put:
      tags:
        - Metadata Schemas
      summary: Update metadata schema
      description: |
        Update a metadata schema.
        If the schema definition changes, a new version is created.
        Requires org:settings:write scope.
      operationId: updateMetadataSchema
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: schemaId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMetadataSchema'
      responses:
        '200':
          description: Schema updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/MetadataSchema'
                  requestId:
                    type: string
        '400':
          $ref: '../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'
        '409':
          description: Schema with this name already exists
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Metadata Schemas
      summary: Delete metadata schema
      description: |
        Soft delete a metadata schema (marks as inactive).
        Existing user metadata is preserved.
        Requires org:settings:delete scope.
      operationId: deleteMetadataSchema
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: schemaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Schema deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'

  /{schemaId}/versions:
    get:
      tags:
        - Metadata Schemas
      summary: List schema versions
      description: |
        List all versions of a metadata schema.
        Schemas are versioned automatically when the definition changes.
        Requires org:settings:read scope.
      operationId: listMetadataSchemaVersions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: schemaId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Schema version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MetadataSchema'
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'

  /{schemaId}/validate:
    post:
      tags:
        - Metadata Schemas
      summary: Validate data against schema
      description: |
        Validate user metadata against the schema definition.
        Returns validation errors if the data does not match the schema.
        Requires org:settings:read scope.
      operationId: validateAgainstSchema
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../openapi.yaml#/components/parameters/OrgId'
        - name: schemaId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  description: The data to validate against the schema
            example:
              data:
                department: Engineering
                title: Senior Developer
                startDate: "2023-01-15"
                isManager: false
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  valid:
                    type: boolean
                    description: Whether the data is valid
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        message:
                          type: string
                  requestId:
                    type: string
        '400':
          $ref: '../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'

components:
  schemas:
    MetadataSchema:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        schema:
          $ref: '#/components/schemas/JsonSchema'
        isActive:
          type: boolean
        version:
          type: integer
        isGlobal:
          type: boolean
          description: If true, applies to all users in the org
        requiredRole:
          type: string
          enum: [ORG_OWNER, ORG_ADMIN, ORG_MEMBER]
          description: Minimum role required to edit this metadata
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          type: string
          nullable: true

    JsonSchema:
      type: object
      properties:
        type:
          type: string
          enum: [object]
        properties:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/JsonSchemaProperty'
        required:
          type: array
          items:
            type: string
        additionalProperties:
          type: boolean

    JsonSchemaProperty:
      type: object
      properties:
        type:
          type: string
          enum: [string, number, integer, boolean, array, object]
        title:
          type: string
        description:
          type: string
        default:
          description: Default value
        enum:
          type: array
          description: Allowed values
        minimum:
          type: number
        maximum:
          type: number
        minLength:
          type: integer
        maxLength:
          type: integer
        pattern:
          type: string
          description: Regex pattern for string validation
        format:
          type: string
          description: Format hint (e.g., email, date, uri)
        items:
          description: Schema for array items
        properties:
          type: object
          description: Properties for nested objects

    CreateMetadataSchema:
      type: object
      required:
        - name
        - schema
      properties:
        name:
          type: string
          pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
          maxLength: 100
          description: Schema name (alphanumeric and underscores, starts with letter)
        description:
          type: string
          maxLength: 500
        schema:
          $ref: '#/components/schemas/JsonSchema'
        isGlobal:
          type: boolean
          default: false
        requiredRole:
          type: string
          enum: [ORG_OWNER, ORG_ADMIN, ORG_MEMBER]
          default: ORG_ADMIN

    UpdateMetadataSchema:
      type: object
      properties:
        name:
          type: string
          pattern: ^[a-zA-Z][a-zA-Z0-9_]*$
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        schema:
          $ref: '#/components/schemas/JsonSchema'
        isActive:
          type: boolean
        isGlobal:
          type: boolean
        requiredRole:
          type: string
          enum: [ORG_OWNER, ORG_ADMIN, ORG_MEMBER]
