openapi: 3.0.3
info:
  title: Z0 Auth - Organizations API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - Organizations
      summary: List user's organizations
      description: |
        List all organizations the current user is a member of.
      operationId: listMyOrganizations
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '../../openapi.yaml#/components/schemas/Organization'
                        - type: object
                          properties:
                            roleType:
                              $ref: '../../openapi.yaml#/components/schemas/OrgRoleType'
                            isDefault:
                              type: boolean
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'

  /{orgId}:
    get:
      tags:
        - Organizations
      summary: Get organization details
      description: |
        Get details about an organization. User must be a member.
      operationId: getOrganizationDetails
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    allOf:
                      - $ref: '../../openapi.yaml#/components/schemas/Organization'
                      - type: object
                        properties:
                          memberCount:
                            type: integer
                          appCount:
                            type: integer
                          myRole:
                            $ref: '../../openapi.yaml#/components/schemas/OrgRoleType'
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    put:
      tags:
        - Organizations
      summary: Update organization
      description: |
        Update organization details. Requires org:settings:write scope.
      operationId: updateOrganizationDetails
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
            example:
              name: Updated Organization Name
              description: Updated description
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '../../openapi.yaml#/components/schemas/Organization'
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /{orgId}/switch:
    post:
      tags:
        - Organizations
      summary: Switch to organization context
      description: |
        Switch the current session context to this organization.
        Returns new tokens with the organization context.
      operationId: switchOrganization
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
      responses:
        '200':
          description: Context switched
          headers:
            Set-Cookie:
              description: New auth cookies with org context
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  organization:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'
