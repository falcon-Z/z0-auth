openapi: 3.0.3
info:
  title: Z0 Auth - Organization Apps API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - Apps
      summary: List apps
      description: |
        List all apps in an organization.
        Requires organization access.
      operationId: listApps
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
      responses:
        '200':
          description: List of apps
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        slug:
                          type: string
                        status:
                          type: string
                          enum: [ACTIVE, INACTIVE, SUSPENDED]
                        apiKey:
                          type: string
                        memberCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'

    post:
      tags:
        - Apps
      summary: Create app
      description: |
        Register a new app in the organization.
        Requires org:apps:write scope.
      operationId: createApp
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                slug:
                  type: string
                  minLength: 2
                  maxLength: 50
                  pattern: '^[a-z0-9-]+$'
                description:
                  type: string
                allowedOrigins:
                  type: array
                  items:
                    type: string
                    format: uri
            example:
              name: My Application
              slug: my-app
              description: A sample application
              allowedOrigins:
                - https://myapp.example.com
      responses:
        '201':
          description: App created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                      status:
                        type: string
                      apiKey:
                        type: string
                      apiSecret:
                        type: string
                        description: Only returned on creation
                      description:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '409':
          description: App with this slug already exists
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'

  /{appId}:
    get:
      tags:
        - Apps
      summary: Get app details
      description: |
        Get details of a specific app including allowed origins.
      operationId: getApp
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: App details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      slug:
                        type: string
                      description:
                        type: string
                      status:
                        type: string
                      apiKey:
                        type: string
                      allowedOrigins:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            origin:
                              type: string
                            createdAt:
                              type: string
                              format: date-time
                      memberCount:
                        type: integer
                      apiKeyCount:
                        type: integer
                      createdAt:
                        type: string
                        format: date-time
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    put:
      tags:
        - Apps
      summary: Update app
      description: |
        Update app details including allowed origins.
        Requires org:apps:write scope.
      operationId: updateApp
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                slug:
                  type: string
                  minLength: 2
                  maxLength: 50
                  pattern: '^[a-z0-9-]+$'
                description:
                  type: string
                  maxLength: 500
                allowedOrigins:
                  type: array
                  items:
                    type: string
                    format: uri
      responses:
        '200':
          description: App updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'
        '409':
          description: App with this slug already exists
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Apps
      summary: Delete app
      description: |
        Soft delete an app (sets status to INACTIVE).
        Requires org:apps:delete scope.
      operationId: deleteApp
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: App deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /{appId}/status:
    patch:
      tags:
        - Apps
      summary: Change app status
      description: |
        Change app status (ACTIVE, INACTIVE, SUSPENDED).
        Requires org:apps:write scope.
      operationId: changeAppStatus
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE, SUSPENDED]
      responses:
        '200':
          description: Status changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /{appId}/regenerate-secret:
    post:
      tags:
        - Apps
      summary: Regenerate API secret
      description: |
        Regenerate the API secret for an app. The old secret will be invalidated.
        Requires org:apps:write scope.
      operationId: regenerateAppSecret
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Secret regenerated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      apiSecret:
                        type: string
                        description: New API secret - save this, it won't be shown again
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'
