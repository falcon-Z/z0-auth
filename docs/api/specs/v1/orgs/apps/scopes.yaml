openapi: 3.0.3
info:
  title: Z0 Auth - App Scopes API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - App Scopes
      summary: List app scopes
      description: |
        List all scopes assigned to an app.
        Requires app:settings:read scope.
      operationId: listAppScopes
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of app scopes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      scopes:
                        type: array
                        items:
                          $ref: '#/components/schemas/AppScopeItem'
                      byCategory:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            $ref: '#/components/schemas/AppScopeItem'
                      total:
                        type: integer
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    post:
      tags:
        - App Scopes
      summary: Assign scope to app
      description: |
        Assign a scope to an app.
        Requires app:settings:write scope.
      operationId: assignScopeToApp
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scopeId
              properties:
                scopeId:
                  type: string
      responses:
        '201':
          description: Scope assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/AppScopeItem'
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'
        '409':
          description: Scope already assigned
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'

  /bulk:
    put:
      tags:
        - App Scopes
      summary: Bulk update app scopes
      description: |
        Replace all scopes assigned to an app.
        Requires app:settings:write scope.
      operationId: bulkUpdateAppScopes
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scopeIds
              properties:
                scopeIds:
                  type: array
                  items:
                    type: string
                  minItems: 1
      responses:
        '200':
          description: Scopes updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AppScopeItem'
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /{scopeId}:
    delete:
      tags:
        - App Scopes
      summary: Remove scope from app
      description: |
        Remove a scope from an app.
        Requires app:settings:delete scope.
      operationId: removeScopeFromApp
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: scopeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Scope removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /members/{userId}/scopes:
    get:
      tags:
        - App Member Scopes
      summary: Get user app scopes
      description: |
        Get user-specific scopes for an app member.
        Requires app:members:read scope.
      operationId: getUserAppScopes
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User app scopes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserAppScope'
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    post:
      tags:
        - App Member Scopes
      summary: Assign scope to user
      description: |
        Assign a scope to a user for a specific app.
        The scope must be assigned to the app first.
        Requires app:members:write scope.
      operationId: assignScopeToUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scopeId
              properties:
                scopeId:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional expiration time for the scope
      responses:
        '201':
          description: Scope assigned to user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/UserAppScope'
                  requestId:
                    type: string
        '400':
          description: Scope not available for this app
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'
        '409':
          description: User already has this scope
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'

  /members/{userId}/scopes/{scopeId}:
    delete:
      tags:
        - App Member Scopes
      summary: Remove scope from user
      description: |
        Remove a scope from a user for a specific app.
        Requires app:members:write scope.
      operationId: removeScopeFromUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/OrgId'
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: scopeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Scope removed from user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

components:
  schemas:
    AppScopeItem:
      type: object
      properties:
        id:
          type: string
        scopeId:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        isSystem:
          type: boolean

    UserAppScope:
      type: object
      properties:
        id:
          type: string
        scopeId:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        grantedAt:
          type: string
          format: date-time
        grantedBy:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
