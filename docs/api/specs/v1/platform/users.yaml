openapi: 3.0.3
info:
  title: Z0 Auth - Platform Users API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - Platform
      summary: List platform users
      description: |
        List all users with platform-level access.
        Requires platform:users:read scope.
      operationId: listPlatformUsers
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/Limit'
        - $ref: '../../openapi.yaml#/components/parameters/Offset'
        - name: roleType
          in: query
          schema:
            $ref: '../../openapi.yaml#/components/schemas/PlatformRoleType'
          description: Filter by platform role
        - name: isActive
          in: query
          schema:
            type: boolean
          description: Filter by active status
      responses:
        '200':
          description: List of platform users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        membershipId:
                          type: string
                        userId:
                          type: string
                        email:
                          type: string
                        name:
                          type: string
                        avatar:
                          type: string
                          nullable: true
                        roleType:
                          $ref: '../../openapi.yaml#/components/schemas/PlatformRoleType'
                        scopes:
                          type: array
                          items:
                            type: string
                        isActive:
                          type: boolean
                        grantedAt:
                          type: string
                          format: date-time
                        grantedBy:
                          type: string
                          nullable: true
                  total:
                    type: integer
                  requestId:
                    type: string
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'

    post:
      tags:
        - Platform
      summary: Grant platform access
      description: |
        Grant platform-level access to a user.
        Requires platform:users:write scope.
      operationId: grantPlatformAccess
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - roleType
              properties:
                userId:
                  type: string
                  description: User ID to grant access
                roleType:
                  $ref: '../../openapi.yaml#/components/schemas/PlatformRoleType'
                scopes:
                  type: array
                  items:
                    type: string
                  description: Additional scopes to grant
            example:
              userId: clx123abc
              roleType: ORG_MANAGER
              scopes:
                - platform:organizations:read
                - platform:organizations:write
      responses:
        '201':
          description: Platform access granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      userId:
                        type: string
                      roleType:
                        type: string
                      scopes:
                        type: array
                        items:
                          type: string
                      isActive:
                        type: boolean
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'
        '409':
          description: User already has platform access
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'

  /{userId}:
    get:
      tags:
        - Platform
      summary: Get platform user details
      description: |
        Get platform access details for a specific user.
        Requires platform:users:read scope.
      operationId: getPlatformUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/UserId'
      responses:
        '200':
          description: Platform user details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      membership:
                        type: object
                        properties:
                          id:
                            type: string
                          roleType:
                            type: string
                          scopes:
                            type: array
                            items:
                              type: string
                          isActive:
                            type: boolean
                          grantedAt:
                            type: string
                            format: date-time
                          grantedBy:
                            type: string
                      user:
                        $ref: '../../openapi.yaml#/components/schemas/User'
                  requestId:
                    type: string
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    patch:
      tags:
        - Platform
      summary: Update platform user
      description: |
        Update platform access for a user.
        Requires platform:users:write scope.
      operationId: updatePlatformUser
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roleType:
                  $ref: '../../openapi.yaml#/components/schemas/PlatformRoleType'
                scopes:
                  type: array
                  items:
                    type: string
                isActive:
                  type: boolean
            example:
              roleType: SECURITY_MANAGER
              scopes:
                - platform:security:manage
                - platform:audit:read
              isActive: true
      responses:
        '200':
          description: Platform user updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      userId:
                        type: string
                      roleType:
                        type: string
                      scopes:
                        type: array
                        items:
                          type: string
                      isActive:
                        type: boolean
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    delete:
      tags:
        - Platform
      summary: Revoke platform access
      description: |
        Revoke platform-level access from a user.
        Requires platform:users:write scope.
        Cannot revoke access from the last SUPER_ADMIN.
      operationId: revokePlatformAccess
      security:
        - BearerAuth: []
      parameters:
        - $ref: '../../openapi.yaml#/components/parameters/UserId'
      responses:
        '200':
          description: Platform access revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  requestId:
                    type: string
        '400':
          description: Cannot revoke (e.g., last super admin)
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'
