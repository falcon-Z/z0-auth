openapi: 3.0.3
info:
  title: Z0 Auth - Platform Organizations API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - Platform
      summary: List all organizations
      description: |
        List all organizations on the platform.
        Requires platform access.
      operationId: listOrganizations
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '../../openapi.yaml#/components/schemas/Organization'
                        - type: object
                          properties:
                            memberCount:
                              type: integer
                            appCount:
                              type: integer
                  requestId:
                    type: string
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'

    post:
      tags:
        - Platform
      summary: Create organization
      description: |
        Create a new organization.
        Requires platform:organizations:write scope.
      operationId: createOrganization
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                slug:
                  type: string
                  minLength: 2
                  maxLength: 50
                  pattern: '^[a-z0-9-]+$'
                description:
                  type: string
                  maxLength: 500
            example:
              name: Acme Corporation
              slug: acme-corp
              description: Acme Corporation's workspace
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '../../openapi.yaml#/components/schemas/Organization'
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '409':
          description: Organization with this slug already exists
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'

  /{id}:
    get:
      tags:
        - Platform
      summary: Get organization details
      description: |
        Get detailed information about an organization.
        Requires platform access.
      operationId: getOrganization
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    allOf:
                      - $ref: '../../openapi.yaml#/components/schemas/Organization'
                      - type: object
                        properties:
                          owners:
                            type: array
                            items:
                              type: object
                              properties:
                                userId:
                                  type: string
                                name:
                                  type: string
                                email:
                                  type: string
                                avatar:
                                  type: string
                          memberCount:
                            type: integer
                          appCount:
                            type: integer
                          memberships:
                            type: array
                            items:
                              type: object
                              properties:
                                membershipId:
                                  type: string
                                userId:
                                  type: string
                                name:
                                  type: string
                                email:
                                  type: string
                                avatar:
                                  type: string
                                roleType:
                                  $ref: '../../openapi.yaml#/components/schemas/OrgRoleType'
                                grantedAt:
                                  type: string
                                  format: date-time
                          apps:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                name:
                                  type: string
                                status:
                                  type: string
                                createdAt:
                                  type: string
                                  format: date-time
                  requestId:
                    type: string
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    put:
      tags:
        - Platform
      summary: Update organization
      description: |
        Update organization details.
        Requires platform:organizations:write scope.
      operationId: updateOrganization
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                slug:
                  type: string
                  minLength: 2
                  maxLength: 50
                  pattern: '^[a-z0-9-]+$'
                description:
                  type: string
                  maxLength: 500
                maxUsers:
                  type: integer
                  minimum: 1
                maxApps:
                  type: integer
                  minimum: 1
            example:
              name: Acme Corp Updated
              maxUsers: 100
              maxApps: 10
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '../../openapi.yaml#/components/schemas/Organization'
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'
        '409':
          description: Organization with this slug already exists
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Platform
      summary: Delete organization
      description: |
        Soft delete an organization (sets status to INACTIVE).
        Requires platform:organizations:delete scope.
      operationId: deleteOrganization
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Organization deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: string
                  requestId:
                    type: string
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /{id}/status:
    patch:
      tags:
        - Platform
      summary: Change organization status
      description: |
        Change organization status (ACTIVE, INACTIVE, SUSPENDED).
        Requires platform:organizations:write scope.
      operationId: changeOrganizationStatus
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: '../../openapi.yaml#/components/schemas/OrganizationStatus'
            example:
              status: SUSPENDED
      responses:
        '200':
          description: Status changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '../../openapi.yaml#/components/schemas/Organization'
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /{id}/stats:
    get:
      tags:
        - Platform
      summary: Get organization statistics
      description: |
        Get detailed statistics for an organization.
        Requires platform access.
      operationId: getOrganizationStats
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Organization statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      organization:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string
                          status:
                            type: string
                          createdAt:
                            type: string
                            format: date-time
                      stats:
                        type: object
                        properties:
                          totalMembers:
                            type: integer
                          activeMembers:
                            type: integer
                          ownerCount:
                            type: integer
                          adminCount:
                            type: integer
                          totalApps:
                            type: integer
                          activeApps:
                            type: integer
                          maxUsers:
                            type: integer
                            nullable: true
                          maxApps:
                            type: integer
                            nullable: true
                          usagePercent:
                            type: object
                            properties:
                              users:
                                type: integer
                                nullable: true
                              apps:
                                type: integer
                                nullable: true
                  requestId:
                    type: string
        '403':
          $ref: '../../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'
