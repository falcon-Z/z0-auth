openapi: 3.0.3
info:
  title: Z0 Auth - User API Keys API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - Users
      summary: List user API keys
      description: |
        List all API keys owned by the current user.
      operationId: listUserApiKeys
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: appId
          in: query
          schema:
            type: string
          description: Filter by app ID
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, ROTATING, DEPRECATED, REVOKED]
          description: Filter by status
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '../../openapi.yaml#/components/schemas/UserApiKey'
                  requestId:
                    type: string
              example:
                success: true
                data:
                  - id: clx123abc
                    userId: clx456def
                    appId: clx789ghi
                    name: "My API Key"
                    keyPrefix: "z0ak_abc"
                    status: ACTIVE
                    scopes:
                      - "read:profile"
                      - "write:data"
                    expiresAt: "2025-01-15T00:00:00.000Z"
                    lastUsedAt: "2024-01-15T10:00:00.000Z"
                    createdAt: "2024-01-01T00:00:00.000Z"
                requestId: req_abc123
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'

    post:
      tags:
        - Users
      summary: Create API key
      description: |
        Create a new API key for the current user.
        The full key is only returned once at creation time.
      operationId: createUserApiKey
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - appId
                - name
              properties:
                appId:
                  type: string
                  description: App to scope the key to
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: Display name for the key
                scopes:
                  type: array
                  items:
                    type: string
                  description: Scopes to grant (must be subset of user's scopes)
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional expiration date
                metadata:
                  type: object
                  description: Optional metadata
            example:
              appId: clx789ghi
              name: "Production API Key"
              scopes:
                - "read:profile"
                - "write:data"
              expiresAt: "2025-01-15T00:00:00.000Z"
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    allOf:
                      - $ref: '../../openapi.yaml#/components/schemas/UserApiKey'
                      - type: object
                        properties:
                          key:
                            type: string
                            description: Full API key (only shown once)
                  requestId:
                    type: string
              example:
                success: true
                message: API key created successfully. Store this key securely - it won't be shown again.
                data:
                  id: clx123abc
                  userId: clx456def
                  appId: clx789ghi
                  name: "Production API Key"
                  keyPrefix: "z0ak_abc"
                  key: "z0ak_abc123def456ghi789jkl012mno345"
                  status: ACTIVE
                  scopes:
                    - "read:profile"
                    - "write:data"
                  expiresAt: "2025-01-15T00:00:00.000Z"
                  createdAt: "2024-01-15T10:00:00.000Z"
                requestId: req_abc123
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '403':
          description: Scope not allowed
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'
        '409':
          description: Key with this name already exists
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'

  /{keyId}:
    get:
      tags:
        - Users
      summary: Get API key details
      description: |
        Get details about a specific API key.
      operationId: getUserApiKey
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '../../openapi.yaml#/components/schemas/UserApiKey'
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    patch:
      tags:
        - Users
      summary: Update API key
      description: |
        Update an API key's name, scopes, or metadata.
      operationId: updateUserApiKey
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                scopes:
                  type: array
                  items:
                    type: string
                metadata:
                  type: object
            example:
              name: "Updated Key Name"
              scopes:
                - "read:profile"
      responses:
        '200':
          description: API key updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '../../openapi.yaml#/components/schemas/UserApiKey'
                  requestId:
                    type: string
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    delete:
      tags:
        - Users
      summary: Revoke API key
      description: |
        Revoke an API key. This action cannot be undone.
      operationId: revokeUserApiKey
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: keyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  requestId:
                    type: string
              example:
                success: true
                message: API key revoked successfully
                requestId: req_abc123
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'
