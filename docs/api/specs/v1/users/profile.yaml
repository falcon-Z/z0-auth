openapi: 3.0.3
info:
  title: Z0 Auth - User Profile API
  version: 1.0.0

paths:
  /me:
    get:
      tags:
        - Users
      summary: Get current user profile
      description: |
        Get the profile of the currently authenticated user.
      operationId: getCurrentUserProfile
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      avatar:
                        type: string
                        nullable: true
                      status:
                        $ref: '../../openapi.yaml#/components/schemas/UserStatus'
                      emailVerified:
                        type: boolean
                      twoFactorEnabled:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
                      lastLoginAt:
                        type: string
                        format: date-time
                        nullable: true
                      hasPlatformAccess:
                        type: boolean
                      platformRole:
                        $ref: '../../openapi.yaml#/components/schemas/PlatformRoleType'
                      organizations:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            slug:
                              type: string
                            roleType:
                              $ref: '../../openapi.yaml#/components/schemas/OrgRoleType'
                            isDefault:
                              type: boolean
                  requestId:
                    type: string
              example:
                success: true
                data:
                  id: clx123abc
                  name: John Doe
                  email: john@example.com
                  avatar: null
                  status: ACTIVE
                  emailVerified: true
                  twoFactorEnabled: false
                  createdAt: "2024-01-01T00:00:00.000Z"
                  lastLoginAt: "2024-01-15T10:00:00.000Z"
                  hasPlatformAccess: false
                  platformRole: null
                  organizations:
                    - id: clx456def
                      name: My Organization
                      slug: my-org
                      roleType: ORG_MEMBER
                      isDefault: true
                requestId: req_abc123
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

    put:
      tags:
        - Users
      summary: Update current user profile
      description: |
        Update the profile of the currently authenticated user.
      operationId: updateCurrentUserProfile
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
            example:
              name: John Smith
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                  requestId:
                    type: string
              example:
                success: true
                data:
                  id: clx123abc
                  name: John Smith
                  email: john@example.com
                requestId: req_abc123
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /change-password:
    post:
      tags:
        - Users
      summary: Change password
      description: |
        Change the password for the currently authenticated user.
        Requires the current password for verification.
      operationId: changePassword
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  description: Current password for verification
                newPassword:
                  type: string
                  minLength: 8
                  description: New password (min 8 characters)
            example:
              currentPassword: OldPassword123!
              newPassword: NewSecurePassword456!
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  requestId:
                    type: string
              example:
                success: true
                message: Password changed successfully
                requestId: req_abc123
        '400':
          $ref: '../../openapi.yaml#/components/responses/ValidationError'
        '401':
          description: Invalid current password
          content:
            application/json:
              schema:
                $ref: '../../openapi.yaml#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: Current password is incorrect
                  code: INVALID_PASSWORD
