openapi: 3.0.3
info:
  title: Z0 Auth - User Sessions API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - Users
      summary: List user sessions
      description: |
        List all active sessions for the current user.
      operationId: listUserSessions
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '../../openapi.yaml#/components/schemas/Session'
                        - type: object
                          properties:
                            isCurrent:
                              type: boolean
                              description: Whether this is the current session
                            device:
                              type: object
                              nullable: true
                              properties:
                                deviceType:
                                  type: string
                                deviceName:
                                  type: string
                                browserName:
                                  type: string
                                osName:
                                  type: string
                  requestId:
                    type: string
              example:
                success: true
                data:
                  - id: clx123abc
                    userId: clx456def
                    appId: clx789ghi
                    userAgent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0"
                    ipAddress: "192.168.1.1"
                    status: ACTIVE
                    createdAt: "2024-01-15T10:00:00.000Z"
                    expiresAt: "2024-01-22T10:00:00.000Z"
                    lastUsedAt: "2024-01-15T11:00:00.000Z"
                    isCurrent: true
                    device:
                      deviceType: DESKTOP
                      deviceName: Chrome on Windows
                      browserName: Chrome
                      osName: Windows
                requestId: req_abc123
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'

  /current:
    get:
      tags:
        - Users
      summary: Get current session
      description: |
        Get details about the current session.
      operationId: getCurrentSession
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: Current session details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '../../openapi.yaml#/components/schemas/Session'
                  requestId:
                    type: string
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /{sessionId}:
    delete:
      tags:
        - Users
      summary: Revoke session
      description: |
        Revoke a specific session. Users can revoke their own sessions.
      operationId: revokeSession
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
          description: Session ID to revoke
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  requestId:
                    type: string
              example:
                success: true
                message: Session revoked successfully
                requestId: req_abc123
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../../openapi.yaml#/components/responses/NotFound'

  /revoke-all:
    post:
      tags:
        - Users
      summary: Revoke all other sessions
      description: |
        Revoke all sessions except the current one.
      operationId: revokeAllSessions
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: All other sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  revokedCount:
                    type: integer
                  requestId:
                    type: string
              example:
                success: true
                message: All other sessions revoked
                revokedCount: 3
                requestId: req_abc123
        '401':
          $ref: '../../openapi.yaml#/components/responses/Unauthorized'
