openapi: 3.0.3
info:
  title: Z0 Auth - Admin Keys API
  version: 1.0.0

paths:
  /.well-known/jwks.json:
    get:
      tags:
        - Admin
      summary: Get JSON Web Key Set
      description: |
        Public endpoint to retrieve the JSON Web Key Set (JWKS) for JWT verification.
        This endpoint is used by clients to verify JWT signatures.
      operationId: getJWKS
      responses:
        '200':
          description: JWKS response
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        kty:
                          type: string
                          example: RSA
                        kid:
                          type: string
                          example: sig-1
                        use:
                          type: string
                          example: sig
                        alg:
                          type: string
                          example: RS256
                        n:
                          type: string
                          description: RSA modulus
                        e:
                          type: string
                          description: RSA exponent
              example:
                keys:
                  - kty: RSA
                    kid: sig-1
                    use: sig
                    alg: RS256
                    n: "0vx7agoebGcQSuu..."
                    e: "AQAB"

  /:
    get:
      tags:
        - Admin
      summary: List signing keys
      description: |
        List the status of signing keys.
        Requires SUPER_ADMIN or SECURITY_MANAGER role.
      operationId: listKeys
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of signing keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  keys:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                          enum: [RSA, EC]
                        status:
                          type: string
                          enum: [active, missing, rotating]
                        location:
                          type: string
              example:
                success: true
                keys:
                  - id: sig-1
                    type: RSA
                    status: active
                    location: disk
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'

  /generate:
    post:
      tags:
        - Admin
      summary: Generate new signing keys
      description: |
        Generate a new RSA key pair for JWT signing.
        This will replace any existing keys.
        Requires SUPER_ADMIN or SECURITY_MANAGER role.
      operationId: generateKeys
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Keys generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  kid:
                    type: string
                    description: Key ID of the new key
              example:
                success: true
                message: New keypair generated and saved.
                kid: sig-1
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '500':
          description: Key generation failed
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: Key generation failed
                  code: KEY_GEN_FAILED
