openapi: 3.0.3
info:
  title: Z0 Auth - Request Traces Admin API
  version: 1.0.0

paths:
  /:
    get:
      tags:
        - Request Traces
      summary: List request traces
      description: |
        List all request traces with optional filters.
        Platform admin access required.
      operationId: listRequestTraces
      security:
        - BearerAuth: []
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by start time (from)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
          description: Filter by start time (to)
        - name: userId
          in: query
          schema:
            type: string
          description: Filter by user ID
        - name: appId
          in: query
          schema:
            type: string
          description: Filter by app ID
        - name: sessionId
          in: query
          schema:
            type: string
          description: Filter by session ID
        - name: method
          in: query
          schema:
            type: string
            enum: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
          description: Filter by HTTP method
        - name: path
          in: query
          schema:
            type: string
          description: Filter by path (contains)
        - name: statusCode
          in: query
          schema:
            type: integer
          description: Filter by status code
        - name: minDuration
          in: query
          schema:
            type: integer
          description: Filter by minimum duration (ms)
        - name: maxDuration
          in: query
          schema:
            type: integer
          description: Filter by maximum duration (ms)
        - name: success
          in: query
          schema:
            type: boolean
          description: Filter by success status
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: List of request traces
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RequestTraceSummary'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'

  /stats:
    get:
      tags:
        - Request Traces
      summary: Get request trace statistics
      description: |
        Get aggregate statistics for request traces.
        Platform admin access required.
      operationId: getRequestTraceStats
      security:
        - BearerAuth: []
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Start of period (defaults to 24h ago)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
          description: End of period (defaults to now)
      responses:
        '200':
          description: Request trace statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/RequestTraceStats'
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'

  /export:
    get:
      tags:
        - Request Traces
      summary: Export request traces
      description: |
        Export request traces as CSV or JSON.
        Platform admin access required.
      operationId: exportRequestTraces
      security:
        - BearerAuth: []
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Start of period (defaults to 24h ago)
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
          description: End of period (defaults to now)
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
            maximum: 10000
      responses:
        '200':
          description: Exported request traces
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RequestTrace'
                  metadata:
                    type: object
                    properties:
                      period:
                        type: object
                        properties:
                          from:
                            type: string
                            format: date-time
                          to:
                            type: string
                            format: date-time
                      recordCount:
                        type: integer
                      exportedAt:
                        type: string
                        format: date-time
                  requestId:
                    type: string
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'

  /{id}:
    get:
      tags:
        - Request Traces
      summary: Get request trace details
      description: |
        Get detailed information about a specific request trace.
        Platform admin access required.
      operationId: getRequestTrace
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Request trace details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/RequestTrace'
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../openapi.yaml#/components/responses/NotFound'

  /user/{userId}:
    get:
      tags:
        - Request Traces
      summary: Get request traces for a user
      description: |
        Get all request traces for a specific user.
        Platform admin access required.
      operationId: getUserRequestTraces
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: User's request traces
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RequestTraceSummary'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
                  userId:
                    type: string
                  requestId:
                    type: string
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'

  /cleanup:
    delete:
      tags:
        - Request Traces
      summary: Clean up old request traces
      description: |
        Delete request traces older than the specified retention period.
        Platform admin access required.
      operationId: cleanupRequestTraces
      security:
        - BearerAuth: []
      parameters:
        - name: retentionDays
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
          description: Delete traces older than this many days
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      deletedCount:
                        type: integer
                      retentionDays:
                        type: integer
                      cutoffDate:
                        type: string
                        format: date-time
                  requestId:
                    type: string
        '400':
          $ref: '../openapi.yaml#/components/responses/ValidationError'
        '401':
          $ref: '../openapi.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../openapi.yaml#/components/responses/Forbidden'

components:
  schemas:
    RequestTraceSummary:
      type: object
      properties:
        id:
          type: string
        requestId:
          type: string
        method:
          type: string
        path:
          type: string
        userId:
          type: string
          nullable: true
        appId:
          type: string
          nullable: true
        sessionId:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        statusCode:
          type: integer
          nullable: true
        duration:
          type: integer
          nullable: true
          description: Duration in milliseconds
        success:
          type: boolean
        errorCode:
          type: string
          nullable: true
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
          nullable: true

    RequestTrace:
      allOf:
        - $ref: '#/components/schemas/RequestTraceSummary'
        - type: object
          properties:
            query:
              type: string
              nullable: true
            userAgent:
              type: string
              nullable: true
            referer:
              type: string
              nullable: true
            contentType:
              type: string
              nullable: true
            responseSize:
              type: integer
              nullable: true
            traceId:
              type: string
              nullable: true
            parentSpanId:
              type: string
              nullable: true
            errorMessage:
              type: string
              nullable: true
            auditLogCount:
              type: integer
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    RequestTraceStats:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
        totals:
          type: object
          properties:
            requests:
              type: integer
            successful:
              type: integer
            failed:
              type: integer
            successRate:
              type: string
        duration:
          type: object
          properties:
            avg:
              type: integer
              description: Average duration in ms
            min:
              type: integer
              description: Minimum duration in ms
            max:
              type: integer
              description: Maximum duration in ms
        byMethod:
          type: object
          additionalProperties:
            type: integer
        byStatusCode:
          type: array
          items:
            type: object
            properties:
              statusCode:
                type: integer
              count:
                type: integer
        slowestRequests:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              requestId:
                type: string
              method:
                type: string
              path:
                type: string
              duration:
                type: integer
              statusCode:
                type: integer
              startTime:
                type: string
                format: date-time
