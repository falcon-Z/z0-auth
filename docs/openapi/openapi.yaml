openapi: 3.1.0
info:
  title: Z0 Auth API
  version: 0.1.0
  summary: Self-hostable authentication and IAM service.
  description: |
    Consolidated OpenAPI specification for Z0 Auth endpoints currently implemented.
    This document is OpenAPI 3.1 compatible and suitable for import into Postman and other API tooling.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://{host}
    description: Deployment host
    variables:
      host:
        default: auth.example.com
        description: Public hostname where Z0 Auth is deployed.
tags:
  - name: Health
    description: Service liveness and readiness endpoints.
  - name: Bootstrap
    description: One-time initialization endpoints for fresh deployments.
paths:
  /health:
    get:
      tags: [Health]
      summary: Legacy liveness endpoint
      operationId: getHealthLegacy
      responses:
        "200":
          description: Server process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      operationId: getHealthLive
      responses:
        "200":
          description: Server process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      operationId: getHealthReady
      responses:
        "200":
          description: Service is ready for traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Service is not ready for traffic.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /api/v1/bootstrap/status:
    get:
      tags: [Bootstrap]
      summary: Get bootstrap status
      operationId: getBootstrapStatus
      responses:
        "200":
          description: Bootstrap status returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapStatusResponse"
        "500":
          description: Failed to query bootstrap status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/bootstrap/initialize:
    post:
      tags: [Bootstrap]
      summary: Initialize platform bootstrap
      operationId: postBootstrapInitialize
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapInitializeRequest"
      responses:
        "201":
          description: Platform initialized successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapInitializeResponse"
        "400":
          description: Invalid request body or validation error.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/ValidationErrorResponse"
        "405":
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Platform already initialized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal bootstrap failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    LivenessResponse:
      type: object
      additionalProperties: false
      required: [status, timestamp, uptime]
      properties:
        status:
          type: string
          const: ok
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
          minimum: 0
    MigrationStatus:
      type: object
      additionalProperties: false
      required: [applied, total, pending]
      properties:
        applied:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        pending:
          type: integer
          minimum: 0
    DatabaseReadiness:
      type: object
      additionalProperties: false
      required: [connected, migrations]
      properties:
        connected:
          type: boolean
        migrations:
          $ref: "#/components/schemas/MigrationStatus"
    ReadinessResponse:
      type: object
      additionalProperties: false
      required: [status, database, timestamp]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        database:
          $ref: "#/components/schemas/DatabaseReadiness"
        timestamp:
          type: string
          format: date-time
    BootstrapStatusResponse:
      type: object
      additionalProperties: false
      required: [bootstrapped, requires_setup, timestamp]
      properties:
        bootstrapped:
          type: boolean
        requires_setup:
          type: boolean
        timestamp:
          type: string
          format: date-time
    BootstrapInitializeRequest:
      type: object
      additionalProperties: false
      required: [platform_name, admin_email, admin_password, confirm_password]
      properties:
        platform_name:
          type: string
          minLength: 3
          maxLength: 255
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
          minLength: 12
          pattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{12,}$
        confirm_password:
          type: string
          minLength: 12
    BootstrapInitializeResponse:
      type: object
      additionalProperties: false
      required: [platform_id, bootstrap_token, admin_email, setup_complete, timestamp]
      properties:
        platform_id:
          type: string
          format: uuid
        bootstrap_token:
          type: string
        admin_email:
          type: string
          format: email
        setup_complete:
          type: boolean
          const: true
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required: [error, details]
      properties:
        error:
          type: string
          const: Validation failed
        details:
          type: object
          additionalProperties:
            type: string
