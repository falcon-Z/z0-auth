openapi: 3.1.0
info:
  title: Z0 Auth Bootstrap API
  version: 0.1.0
  description: One-time bootstrap endpoints used to initialize a new Z0 Auth deployment.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
paths:
  /api/v1/bootstrap/status:
    get:
      summary: Get bootstrap status
      description: Returns whether the platform is already initialized.
      operationId: getBootstrapStatus
      tags:
        - Bootstrap
      responses:
        "200":
          description: Bootstrap status returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapStatusResponse"
        "500":
          description: Failed to query bootstrap status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed for this route.
          headers:
            Allow:
              description: Comma-separated list of supported HTTP methods for the route.
              schema:
                type: string
                example: GET
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/bootstrap/initialize:
    post:
      summary: Initialize platform bootstrap
      description: |
        One-time initialization endpoint.
        Creates platform, platform admin, and bootstrap token in a single transaction.
      operationId: postBootstrapInitialize
      tags:
        - Bootstrap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapInitializeRequest"
      responses:
        "201":
          description: Platform initialized successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapInitializeResponse"
        "400":
          description: Invalid request body or validation error.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - $ref: "#/components/schemas/ValidationErrorResponse"
        "405":
          description: Method not allowed.
          headers:
            Allow:
              description: Comma-separated list of supported HTTP methods for the route.
              schema:
                type: string
                example: POST
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Platform already initialized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal bootstrap failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    BootstrapStatusResponse:
      type: object
      additionalProperties: false
      required:
        - bootstrapped
        - requires_setup
        - timestamp
      properties:
        bootstrapped:
          type: boolean
        requires_setup:
          type: boolean
        timestamp:
          type: string
          format: date-time
    BootstrapInitializeRequest:
      type: object
      additionalProperties: false
      required:
        - platform_name
        - admin_email
        - admin_password
        - confirm_password
      properties:
        platform_name:
          type: string
          minLength: 3
          maxLength: 255
        admin_email:
          type: string
          format: email
        admin_password:
          type: string
          minLength: 12
          pattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{12,}$
          description: Must include upper, lower, digit, and special character.
        confirm_password:
          type: string
          minLength: 12
    BootstrapInitializeResponse:
      type: object
      additionalProperties: false
      required:
        - platform_id
        - bootstrap_token
        - admin_email
        - setup_complete
        - timestamp
      properties:
        platform_id:
          type: string
          format: uuid
        bootstrap_token:
          type: string
        admin_email:
          type: string
          format: email
        setup_complete:
          type: boolean
          const: true
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
    ValidationErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
        - details
      properties:
        error:
          type: string
          const: Validation failed
        details:
          type: object
          additionalProperties:
            type: string
