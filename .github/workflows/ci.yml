# ─────────────────────────────────────────────────────────────────────────────
# Z0 Auth – Continuous Integration
#
# Trigger
# ───────
# • push to master or development   → type-check + tests + Docker build & push
# • pull_request → master / development → type-check + tests only (status checks)
#
# Jobs
# ────
# type-check   TypeScript strict type check (no emit)
# test         Bun test suite backed by a real PostgreSQL service container
# docker       Build and push Docker image to ghcr.io
#              Runs ONLY on direct push (i.e. after a PR is merged).
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions)
# ─────────────────────────────────────────────────────────────────────
# DATABASE_URL        – PostgreSQL URL (optional; CI uses the service container)
# APP_SECRET          – 64-char hex string (openssl rand -hex 32)
# JWT_SECRET          – 64-char hex string (openssl rand -hex 32)
# SMTP_ENCRYPTION_KEY – 64-char hex string (openssl rand -hex 32)
#
# If a secret is absent in CI, a fresh random value is generated at runtime
# so no predictable test key is ever stored in this file.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - master
      - development
  pull_request:
    branches:
      - master
      - development
  workflow_dispatch:

# Cancel in-progress runs for the same ref to avoid wasting runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUN_VERSION: "1"

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. TypeScript type-check ───────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bunx tsc --noEmit

  # ── 2. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: z0auth
          POSTGRES_PASSWORD: z0auth
          POSTGRES_DB: z0auth
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # DATABASE_URL: use the configured secret when present; otherwise point
      # at the ephemeral service container spun up above.
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://z0auth:z0auth@localhost:5432/z0auth' }}
      NODE_ENV: test
      APP_URL: http://localhost:3000
      APP_NAME: "Z0 Auth CI"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Resolve APP_SECRET / JWT_SECRET / SMTP_ENCRYPTION_KEY.
      # Priority: configured GitHub secret → freshly generated random value.
      # No hardcoded fallback values are stored in this file.
      #
      # Why the two-step (_VAR → VAR) approach:
      # Interpolating ${{ secrets.X }} directly inside a `run:` shell script is
      # safe for simple values but can break if the secret contains shell-special
      # characters.  Injecting via step-level `env:` passes secrets as OS
      # environment variables (GitHub Actions masks them in logs automatically),
      # and the shell then uses ${_VAR:-fallback} safely without any parsing risk.
      - name: Resolve CI secrets
        env:
          _APP_SECRET: ${{ secrets.APP_SECRET }}
          _JWT_SECRET: ${{ secrets.JWT_SECRET }}
          _SMTP_ENCRYPTION_KEY: ${{ secrets.SMTP_ENCRYPTION_KEY }}
        run: |
          echo "APP_SECRET=${_APP_SECRET:-$(openssl rand -hex 32)}" >> "$GITHUB_ENV"
          echo "JWT_SECRET=${_JWT_SECRET:-$(openssl rand -hex 32)}" >> "$GITHUB_ENV"
          echo "SMTP_ENCRYPTION_KEY=${_SMTP_ENCRYPTION_KEY:-$(openssl rand -hex 32)}" >> "$GITHUB_ENV"

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply database migrations
        run: bunx prisma migrate deploy

      - name: Run tests
        run: bun test --timeout 30000

  # ── 3. Docker build & push ────────────────────────────────────────────────
  # Runs only on direct push events (master / development), i.e. after a PR
  # has been reviewed and merged.  Pull request runs only execute jobs 1 & 2
  # above to provide status checks without building or publishing images.
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [type-check, test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags and OCI labels.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Short SHA for every run (traceability)
            type=sha,prefix=sha-,format=short
            # Branch name tag (e.g. "development", "master")
            type=ref,event=branch
            # Stable "latest" tag only on master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache to speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_SHA=${{ github.sha }}

