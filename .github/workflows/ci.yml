# ─────────────────────────────────────────────────────────────────────────────
# Z0 Auth – Continuous Integration
#
# Runs on every push to any branch and on pull requests targeting
# `development` or `master`.
#
# Jobs
# ────
# type-check   TypeScript strict type check (no emit)
# test         Bun test suite backed by a real PostgreSQL service container
# docker       Build Docker image; push to ghcr.io when landing on
#              `development` or `master` (i.e. after a PR is merged)
#
# Required GitHub Secrets
# ───────────────────────
# DATABASE_URL  – overrides the service-container URL if you need a different
#                 value in CI (optional; the workflow provides a default)
# APP_SECRET    – at least 32-char random string  (openssl rand -hex 32)
# JWT_SECRET    – at least 32-char random string  (openssl rand -hex 32)
# SMTP_ENCRYPTION_KEY – at least 32-char random string (can be dummy in CI)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
      - development
  workflow_dispatch:

# Cancel in-progress runs for the same ref so we don't waste runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUN_VERSION: "1"

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. TypeScript type-check ───────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bunx tsc --noEmit

  # ── 2. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: z0auth
          POSTGRES_PASSWORD: z0auth
          POSTGRES_DB: z0auth
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://z0auth:z0auth@localhost:5432/z0auth' }}
      NODE_ENV: test
      APP_SECRET: ${{ secrets.APP_SECRET || '63692d6170702d7365637265742d6b65792d666f722d63692d74657374696e67' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || '63692d6a77742d7365637265742d6b65792d666f722d63692d74657374696e67' }}
      SMTP_ENCRYPTION_KEY: ${{ secrets.SMTP_ENCRYPTION_KEY || '63692d736d74702d656e635f6b65792d666f722d63692d74657374696e67006f' }}
      APP_URL: http://localhost:3000
      APP_NAME: "Z0 Auth CI"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Sync database schema
        # No migration files are committed to the repo yet.
        # prisma db push syncs schema.prisma directly to the database.
        # Switch to `prisma migrate deploy` once migration files are committed.
        run: bunx prisma db push --accept-data-loss

      - name: Run tests
        run: bun test --timeout 30000

  # ── 3. Docker build & push ────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [type-check, test]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to ghcr.io only when we intend to push (not on PRs).
      - name: Log in to GitHub Container Registry
        if: |
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/development')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags and OCI labels.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Short SHA for every run (traceability)
            type=sha,prefix=sha-,format=short
            # Branch name tag (e.g. "development", "master")
            type=ref,event=branch
            # Stable "latest" tag only on master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Push only when code lands on master or development.
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/development') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache to speed up subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arguments (no secrets injected into the image layer)
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_SHA=${{ github.sha }}
