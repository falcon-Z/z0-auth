name: CI

on:
  push:
    branches: [main, rewrite]
  pull_request:
    branches: [main, rewrite]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: z0auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/z0auth
      TEST_DATABASE_URL: postgresql://postgres:password@localhost:5432/z0auth_test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create test database
        run: bun run db:test:init

      - name: Run tests
        run: bun test
