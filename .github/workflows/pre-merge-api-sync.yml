name: Pre-merge API Sync Guard

on:
  pull_request:
    branches:
      - main

jobs:
  api-sync:
    name: API docs/tests sync check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install

      - name: Enforce API/OpenAPI/test sync
        run: bash scripts/premerge-api-sync-check.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
