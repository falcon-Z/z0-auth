version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: z0-auth
    ports:
      - "3000:3000"
    environment:
      # Database connection (REQUIRED - only thing you need to set)
      - DATABASE_URL=${DATABASE_URL}
    
    volumes:
      # Mount keys directory for JWT keys persistence
      - ./keys:/app/keys
    
    restart: unless-stopped
    
    # Run migrations on startup
    command: >
      sh -c "
        mkdir -p /app/keys &&
        echo 'Running database migrations...' &&
        bun run prisma:deploy &&
        echo 'Starting application...' &&
        bun run start
      "
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Health check
    healthcheck:
      test: ["CMD", "bun", "run", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
